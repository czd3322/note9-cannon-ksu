name: Build Kernel with AnyKernel3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse repos.json
        id: config
        run: |
          sudo apt-get install -y jq
          echo "KERNEL_SOURCE=$(jq -r '.[0].kernelSource.repo' repos.json)" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=$(jq -r '.[0].kernelSource.branch' repos.json)" >> $GITHUB_ENV
          echo "DEVICE=$(jq -r '.[0].kernelSource.device' repos.json)" >> $GITHUB_ENV
          echo "ARCH=$(jq -r '.[0].params.ARCH' repos.json)" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=$(jq -r '.[0].params.CLANG_TRIPLE' repos.json)" >> $GITHUB_ENV
          echo "CROSS_COMPILE=$(jq -r '.[0].params.CROSS_COMPILE' repos.json)" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=$(jq -r '.[0].params.CROSS_COMPILE_ARM32' repos.json)" >> $GITHUB_ENV
          echo "CC=$(jq -r '.[0].params.CC' repos.json)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl \
            zlib1g-dev libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev \
            squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev \
            pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl \
            bc libc6-dev-i386 libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf

      - name: Download toolchains
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchains
          cd $GITHUB_WORKSPACE/toolchains

          # Clang 11 from repos.json
          git clone https://gitlab.com/ThankYouMario/android_prebuilts_clang-standalone -b 11 clang --depth=1

          # GNU assembler (gas) from repos.json
          git clone https://android.googlesource.com/platform/prebuilts/gas/linux-x86 -b master gas --depth=1

          echo "$GITHUB_WORKSPACE/toolchains/clang/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchains/gas/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          cd $GITHUB_WORKSPACE
          git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_BRANCH }} kernel --depth=1

      - name: Setup KernelSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash

      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH=$GITHUB_WORKSPACE/toolchains/clang/bin:$GITHUB_WORKSPACE/toolchains/gas/bin:/usr/bin:$PATH
          export ARCH=${{ env.ARCH }}
          export CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}
          export CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          export CC=${{ env.CC }}

          make O=out ${{ env.DEVICE }}_defconfig
          make -j$(nproc --all) O=out \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            STRIP=llvm-strip \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            READELF=llvm-readelf \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=/usr/bin/arm-linux-gnueabi- \
            CLANG_TRIPLE=$CLANG_TRIPLE

      - name: Prepare AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE
          git clone https://github.com/osm0sis/AnyKernel3 --depth=1
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel3/
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh
          sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|block=auto;|' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=auto;/' AnyKernel3/anykernel.sh
          echo "device.name1=${{ env.DEVICE }}" >> AnyKernel3/anykernel.sh
          echo "device.name2=cannong" >> AnyKernel3/anykernel.sh
          echo "kernel.string=KernelSU-${{ env.DEVICE }}" >> AnyKernel3/anykernel.sh
          echo "kernel=Image.gz" >> AnyKernel3/anykernel.sh

      - name: Package AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/AnyKernel3
          zip -r ../AnyKernel3-${{ env.DEVICE }}-KSU.zip ./*

      - name: Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-${{ env.DEVICE }}-KSU
          path: ${{ github.workspace }}/AnyKernel3-${{ env.DEVICE }}-KSU.zip
